<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
    <!-- Background -->
    <rect width="64" height="64" rx="12" fill="#1a1f2e"/>

    <!-- Clipboard body -->
    <rect x="10" y="16" width="34" height="42" rx="4" fill="#2a3142" stroke="#4a5980" stroke-width="1.5"/>
    <!-- Paper -->
    <rect x="13" y="23" width="28" height="33" rx="2" fill="#e8eeff"/>
    <!-- Clip tab -->
    <rect x="20" y="11" width="16" height="10" rx="3" fill="#4a9eff"/>
    <rect x="24" y="8" width="8" height="8" rx="2.5" fill="#2a6fcc"/>

    <!-- Note lines -->
    <line x1="17" y1="31" x2="37" y2="31" stroke="#8fa0c0" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="17" y1="37" x2="37" y2="37" stroke="#8fa0c0" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="17" y1="43" x2="34" y2="43" stroke="#8fa0c0" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="17" y1="49" x2="36" y2="49" stroke="#a0b0cc" stroke-width="1.4" stroke-linecap="round"/>

    <!-- Magnifying glass lens -->
    <circle cx="40" cy="42" r="14" fill="#4a9eff" fill-opacity="0.13"/>
    <circle cx="40" cy="42" r="14" fill="none" stroke="#4a9eff" stroke-width="3.5"/>
    <!-- Handle -->
    <line x1="50" y1="52" x2="58" y2="60" stroke="#4a9eff" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Gleam -->
    <line x1="33" y1="35" x2="37" y2="31" stroke="#ffffff" stroke-opacity="0.45" stroke-width="2" stroke-linecap="round"/>
</svg>